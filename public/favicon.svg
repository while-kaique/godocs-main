<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="GoDocs">
  <!-- D completo em azul: a curva da barriga atravessa a borda direita e fica sobre o
       transparente, dando o efeito de "sair" do fundo azul -->
  <path fill="#0059A9" fill-rule="evenodd" d="M104 150 L250 150 C380 150 452 196 452 256 C452 316 380 362 250 362 L104 362 Z M160 198 L246 198 C340 198 372 224 372 256 C372 288 340 314 246 314 L160 314 Z"/>
  <!-- Fundo azul (quadrado arredondado): cobre a parte interna do D, deixando só a curva emergir -->
  <rect x="40" y="70" width="372" height="372" rx="84" fill="#0059A9"/>
  <!-- D vazado em branco recortado ao quadrado: dentro lê em negativo, fora segue azul sobre o transparente -->
  <clipPath id="quadrado"><rect x="40" y="70" width="372" height="372" rx="84"/></clipPath>
  <path clip-path="url(#quadrado)" fill="#FFFFFF" fill-rule="evenodd" d="M104 150 L250 150 C380 150 452 196 452 256 C452 316 380 362 250 362 L104 362 Z M160 198 L246 198 C340 198 372 224 372 256 C372 288 340 314 246 314 L160 314 Z"/>
</svg>
